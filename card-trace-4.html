<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>CardTrace</title>
<style>
  :root{
    --ink:#0d0f10;
    --panel:#16181a;
    --panel2:#1e2124;
    --line:#2a2e32;
    --text:#eef0f1;
    --dim:#8b9196;
    --accent:#e8432f; /* card-suit red, not the generic terracotta */
    --accent2:#2fae7a; /* card-suit green/black-substitute for secondary actions */
    --ok:#2fae7a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%; background:var(--ink); color:var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior:none; user-select:none;
  }
  #app{position:fixed; inset:0; overflow:hidden;}

  /* ---------- HOME SCREEN ---------- */
  #home{position:absolute; inset:0; display:flex; flex-direction:column; background:var(--ink);}
  #home header{
    padding:22px 20px 14px; border-bottom:1px solid var(--line);
    display:flex; align-items:baseline; justify-content:space-between;
  }
  #home header h1{font-size:20px; margin:0; letter-spacing:0.2px; font-weight:700;}
  #home header h1 span{color:var(--accent);}
  #home header small{color:var(--dim); font-size:12px;}
  #projectList{flex:1; overflow-y:auto; padding:14px; display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .card-tile{
    background:var(--panel); border:1px solid var(--line); border-radius:14px; overflow:hidden;
    display:flex; flex-direction:column; cursor:pointer;
  }
  .card-tile img{width:100%; aspect-ratio:1/1; object-fit:cover; display:block; background:#000;}
  .card-tile .meta{padding:9px 10px 11px;}
  .card-tile .meta .name{font-size:13px; font-weight:600;}
  .card-tile .meta .date{font-size:11px; color:var(--dim); margin-top:2px;}
  #emptyState{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 30px; text-align:center; color:var(--dim);}
  #emptyState .suit{font-size:44px; margin-bottom:10px; color:var(--accent);}
  #newBtn{
    position:absolute; right:20px; bottom:26px; width:60px; height:60px; border-radius:50%;
    background:var(--accent); color:#fff; font-size:30px; border:none; display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 24px rgba(232,67,47,0.35);
  }

  /* ---------- EDITOR SCREEN ---------- */
  #editor{position:absolute; inset:0; display:none; background:#000;}
  #editor.active{display:block;}
  video{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0;}
  #glcanvas{position:absolute; inset:0; width:100%; height:100%; touch-action:none;}

  #topBar{
    position:absolute; top:0; left:0; right:0; padding:14px 14px; display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(to bottom, rgba(0,0,0,0.55), transparent); z-index:5;
  }
  .iconBtn{
    width:40px; height:40px; border-radius:20px; background:rgba(20,22,24,0.7); border:1px solid rgba(255,255,255,0.12);
    color:var(--text); display:flex; align-items:center; justify-content:center; font-size:18px;
  }
  #lockStatus{
    font-size:12px; padding:6px 12px; border-radius:20px; background:rgba(20,22,24,0.7); border:1px solid rgba(255,255,255,0.12);
    display:flex; align-items:center; gap:6px;
  }
  #lockDot{width:8px; height:8px; border-radius:50%; background:var(--dim);}
  #lockDot.on{background:var(--ok); box-shadow:0 0 8px var(--ok);}

  #bottomBar{
    position:absolute; left:0; right:0; bottom:0; padding:10px 14px calc(16px + env(safe-area-inset-bottom));
    background:linear-gradient(to top, rgba(0,0,0,0.65), transparent); z-index:5;
    display:flex; flex-direction:column; gap:10px;
  }
  .row{display:flex; align-items:center; gap:10px;}
  .row label{font-size:11px; color:var(--dim); width:52px; flex-shrink:0;}
  input[type=range]{flex:1; accent-color:var(--accent);}
  #toolRow{display:flex; justify-content:space-around;}
  .tool{
    display:flex; flex-direction:column; align-items:center; gap:4px; color:var(--dim); font-size:10px; background:none; border:none;
  }
  .tool .ic{width:44px; height:44px; border-radius:22px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--text);}
  .tool.active .ic{background:var(--accent); border-color:var(--accent);}

  #pickBtn{display:none;}
  #loadPrompt{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
    background:rgba(0,0,0,0.55); z-index:4; padding:30px; text-align:center;
  }
  #loadPrompt button{
    background:var(--accent); color:#fff; border:none; padding:14px 26px; border-radius:30px; font-size:15px; font-weight:600;
  }
  #loadPrompt p{color:#cfd3d6; font-size:13px; max-width:280px; line-height:1.5;}
  #toast{
    position:absolute; left:50%; bottom:100px; transform:translateX(-50%); background:rgba(20,22,24,0.92); color:var(--text);
    padding:8px 16px; border-radius:20px; font-size:12px; z-index:6; opacity:0; transition:opacity 0.25s; pointer-events:none;
    border:1px solid var(--line);
  }
  #toast.show{opacity:1;}
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div id="home">
    <header>
      <h1>Card<span>Trace</span></h1>
      <small id="deviceHint"></small>
    </header>
    <div id="emptyState">
      <div class="suit">♠</div>
      <div>No projects yet.<br>Tap + to anchor your first reference image to a playing card.</div>
    </div>
    <div id="projectList" style="display:none;"></div>
    <button id="newBtn">+</button>
  </div>

  <!-- EDITOR -->
  <div id="editor">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="glcanvas"></canvas>

    <div id="loadPrompt">
      <p>Place a playing card flat on your paper, in view of the camera. Then load a reference image to anchor.</p>
      <button id="chooseImgBtn">Choose reference image</button>
      <input id="pickBtn" type="file" accept="image/*">
    </div>

    <div id="topBar">
      <button class="iconBtn" id="backBtn">←</button>
      <div id="lockStatus"><span id="lockDot"></span><span id="lockText">Looking for card…</span></div>
      <button class="iconBtn" id="rotateBtn">⟳</button>
    </div>

    <div id="bottomBar">
      <div class="row">
        <label>Opacity</label>
        <input type="range" id="opacitySlider" min="10" max="100" value="55">
      </div>
      <div class="row">
        <label>Scale</label>
        <input type="range" id="scaleSlider" min="20" max="400" value="100">
      </div>
      <div id="toolRow">
        <button class="tool active" id="tGrid"><span class="ic">▦</span>Grid</button>
        <button class="tool" id="tSwap"><span class="ic">⇄</span>New image</button>
        <button class="tool" id="tReset"><span class="ic">⟲</span>Recenter</button>
        <button class="tool" id="tDelete"><span class="ic">🗑</span>Delete</button>
      </div>
    </div>

    <div id="toast"></div>
  </div>

</div>

<script src="https://docs.opencv.org/4.9.0/opencv.js" async></script>
<script>
(function(){
  "use strict";

  /* ============ INDEXEDDB PROJECT STORE ============ */
  const DB_NAME = "cardtrace", DB_VER = 1, STORE = "projects";
  let db;
  function openDB(){
    return new Promise((res, rej)=>{
      const req = indexedDB.open(DB_NAME, DB_VER);
      req.onupgradeneeded = e=>{
        const d = e.target.result;
        if(!d.objectStoreNames.contains(STORE)){
          d.createObjectStore(STORE, {keyPath:"id"});
        }
      };
      req.onsuccess = e=>{ db = e.target.result; res(db); };
      req.onerror = e=> rej(e);
    });
  }
  function saveProject(p){
    return new Promise((res,rej)=>{
      const tx = db.transaction(STORE,"readwrite");
      tx.objectStore(STORE).put(p);
      tx.oncomplete = ()=>res();
      tx.onerror = e=>rej(e);
    });
  }
  function deleteProject(id){
    return new Promise((res,rej)=>{
      const tx = db.transaction(STORE,"readwrite");
      tx.objectStore(STORE).delete(id);
      tx.oncomplete = ()=>res();
      tx.onerror = e=>rej(e);
    });
  }
  function loadAllProjects(){
    return new Promise((res,rej)=>{
      const tx = db.transaction(STORE,"readonly");
      const req = tx.objectStore(STORE).getAll();
      req.onsuccess = ()=>res(req.result.sort((a,b)=>b.updated-a.updated));
      req.onerror = e=>rej(e);
    });
  }

  /* ============ TOAST ============ */
  const toastEl = document.getElementById("toast");
  let toastTimer;
  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>toastEl.classList.remove("show"), 1400);
  }

  /* ============ HOME SCREEN ============ */
  const homeEl = document.getElementById("home");
  const editorEl = document.getElementById("editor");
  const listEl = document.getElementById("projectList");
  const emptyEl = document.getElementById("emptyState");

  async function refreshHome(){
    const projects = await loadAllProjects();
    if(projects.length === 0){
      emptyEl.style.display = "flex";
      listEl.style.display = "none";
      return;
    }
    emptyEl.style.display = "none";
    listEl.style.display = "grid";
    listEl.innerHTML = "";
    projects.forEach(p=>{
      const tile = document.createElement("div");
      tile.className = "card-tile";
      const d = new Date(p.updated);
      tile.innerHTML = `<img src="${p.thumb || p.imageData}"><div class="meta">
        <div class="name">${p.name}</div>
        <div class="date">${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
      </div>`;
      tile.onclick = ()=> openEditor(p);
      listEl.appendChild(tile);
    });
  }

  document.getElementById("newBtn").onclick = ()=> openEditor(null);
  document.getElementById("backBtn").onclick = ()=>{
    stopCamera();
    editorEl.classList.remove("active");
    refreshHome();
  };

  /* ============ EDITOR STATE ============ */
  let current = null; // project object
  const video = document.getElementById("video");
  const canvas = document.getElementById("glcanvas");
  const ctx = canvas.getContext("2d");
  let stream = null;
  let refImg = new Image();
  let refImgLoaded = false;

  // transform of reference image within CARD-LOCAL space (units: 1 unit = 1mm, card is 63 x 88)
  const CARD_W = 63, CARD_H = 88;
  let tf = { x: CARD_W/2, y: CARD_H/2 - 40, scale: 1.6, rot: 0 }; // default sits above the card
  let opacity = 0.55;
  let showGrid = true;

  let lastHomography = null; // 3x3 array, card-local(mm) -> video pixel space
  let framesSinceSeen = 999;
  const GRACE_FRAMES = 20;

  function openEditor(project){
    homeEl.style.display = "none";
    editorEl.classList.add("active");
    document.getElementById("loadPrompt").style.display = project && project.imageData ? "none" : "flex";
    if(project){
      current = project;
      tf = project.tf || tf;
      opacity = project.opacity ?? 0.55;
      showGrid = project.showGrid ?? true;
      document.getElementById("opacitySlider").value = Math.round(opacity*100);
      document.getElementById("scaleSlider").value = Math.round(tf.scale*100);
      if(project.imageData){
        refImg = new Image();
        refImg.onload = ()=>{ refImgLoaded = true; };
        refImg.src = project.imageData;
      } else {
        refImgLoaded = false;
      }
    } else {
      current = { id: "p_"+Date.now(), name:"Untitled", imageData:null, tf, opacity, showGrid, updated: Date.now() };
      refImgLoaded = false;
    }
    startCamera();
  }

  async function startCamera(){
    try{
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: {ideal:"environment"}, width:{ideal:1280}, height:{ideal:720} },
        audio:false
      });
      video.srcObject = stream;
      await video.play();
      resizeCanvas();
      requestAnimationFrame(loop);
    }catch(err){
      toast("Camera access denied or unavailable.");
    }
  }
  function stopCamera(){
    if(stream){ stream.getTracks().forEach(t=>t.stop()); stream = null; }
  }
  function resizeCanvas(){
    canvas.width = window.innerWidth * devicePixelRatio;
    canvas.height = window.innerHeight * devicePixelRatio;
    canvas.style.width = window.innerWidth+"px";
    canvas.style.height = window.innerHeight+"px";
  }
  window.addEventListener("resize", resizeCanvas);

  /* ============ CARD DETECTION (OpenCV.js) ============ */
  let cvReady = false;
  function onCvReady(){ cvReady = true; }
  const cvWaiter = setInterval(()=>{
    if(window.cv && cv.Mat){ clearInterval(cvWaiter); onCvReady(); }
  }, 200);

  let work = { src:null, gray:null, edges:null, kernel:null };
  function ensureMats(w,h){
    if(!work.kernel) work.kernel = cv.Mat.ones(3,3,cv.CV_8U); // create ONCE, reuse forever
    if(work.src && work.src.rows===h && work.src.cols===w) return;
    if(work.src) work.src.delete();
    if(work.gray) work.gray.delete();
    if(work.edges) work.edges.delete();
    work.src = new cv.Mat(h,w,cv.CV_8UC4);
    work.gray = new cv.Mat(h,w,cv.CV_8UC1);
    work.edges = new cv.Mat(h,w,cv.CV_8UC1);
  }

  const detCanvas = document.createElement("canvas");
  const detCtx = detCanvas.getContext("2d", {willReadFrequently:true});
  const DET_W = 480; // downscaled detection width for speed

  let detectFailCount = 0;
  function detectCard(){
    if(!cvReady || video.videoWidth === 0) return null;
    try{
      return detectCardInner();
    }catch(err){
      detectFailCount++;
      if(detectFailCount === 1) toast("Detection hiccup — retrying");
      if(detectFailCount > 30){ cvReady = false; toast("Card detection disabled after repeated errors"); }
      return null;
    }
  }
  function detectCardInner(){
    const scale = DET_W / video.videoWidth;
    const dw = DET_W, dh = Math.round(video.videoHeight*scale);
    detCanvas.width = dw; detCanvas.height = dh;
    detCtx.drawImage(video, 0,0,dw,dh);
    const imgData = detCtx.getImageData(0,0,dw,dh);

    ensureMats(dw,dh);
    work.src.data.set(imgData.data);
    cv.cvtColor(work.src, work.gray, cv.COLOR_RGBA2GRAY);
    cv.GaussianBlur(work.gray, work.gray, new cv.Size(5,5), 0);
    cv.Canny(work.gray, work.edges, 40, 120);
    cv.dilate(work.edges, work.edges, work.kernel);

    const contours = new cv.MatVector();
    const hierarchy = new cv.Mat();
    cv.findContours(work.edges, contours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);

    let best = null, bestScore = -1;
    const targetRatio = CARD_H / CARD_W; // 88/63 ≈ 1.397 (long side / short side)

    for(let i=0;i<contours.size();i++){
      const cnt = contours.get(i);
      const peri = cv.arcLength(cnt, true);
      const approx = new cv.Mat();
      cv.approxPolyDP(cnt, approx, 0.02*peri, true);
      if(approx.rows === 4){
        const area = Math.abs(cv.contourArea(approx));
        const frameArea = dw*dh;
        if(area > frameArea*0.02 && area < frameArea*0.85 && cv.isContourConvex(approx)){
          const pts = [];
          for(let j=0;j<4;j++) pts.push({x:approx.data32S[j*2], y:approx.data32S[j*2+1]});
          const ordered = orderCorners(pts);
          const wTop = dist(ordered[0], ordered[1]);
          const wBot = dist(ordered[3], ordered[2]);
          const hLeft = dist(ordered[0], ordered[3]);
          const hRight = dist(ordered[1], ordered[2]);
          const w = (wTop+wBot)/2, h = (hLeft+hRight)/2;
          if(w > 0 && h > 0){
            const ratio = Math.max(w,h)/Math.min(w,h);
            const ratioErr = Math.abs(ratio - targetRatio)/targetRatio;
            if(ratioErr < 0.22){
              const score = area * (1 - ratioErr);
              if(score > bestScore){ bestScore = score; best = ordered; }
            }
          }
        }
      }
      approx.delete(); cnt.delete();
    }
    contours.delete(); hierarchy.delete();

    if(!best) return null;
    // scale corners back up to full video resolution
    return best.map(p=>({x:p.x/scale, y:p.y/scale}));
  }

  function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }

  function orderCorners(pts){
    // returns [topLeft, topRight, bottomRight, bottomLeft]
    const sorted = pts.slice().sort((a,b)=>(a.x+a.y)-(b.x+b.y));
    const tl = sorted[0], br = sorted[3];
    const rest = pts.filter(p=>p!==tl && p!==br);
    let tr, bl;
    if(rest[0].y < rest[1].y){ tr = rest[0]; bl = rest[1]; } else { tr = rest[1]; bl = rest[0]; }
    return [tl,tr,br,bl];
  }

  /* ============ HOMOGRAPHY (card-local mm -> video pixel) ============ */
  function computeHomography(corners){
    // card-local coords with origin at card top-left, portrait: (0,0)-(63,0)-(63,88)-(0,88)
    const srcTri = cv.matFromArray(4,1,cv.CV_32FC2, [0,0, CARD_W,0, CARD_W,CARD_H, 0,CARD_H]);
    const dstTri = cv.matFromArray(4,1,cv.CV_32FC2, [
      corners[0].x, corners[0].y, corners[1].x, corners[1].y,
      corners[2].x, corners[2].y, corners[3].x, corners[3].y
    ]);
    const H = cv.getPerspectiveTransform(srcTri, dstTri);
    const arr = Array.from(H.data64F);
    srcTri.delete(); dstTri.delete(); H.delete();
    return arr; // row-major 3x3
  }

  function applyH(H, x, y){
    const w = H[6]*x + H[7]*y + H[8];
    return {
      x: (H[0]*x + H[1]*y + H[2]) / w,
      y: (H[3]*x + H[4]*y + H[5]) / w
    };
  }

  /* ============ RENDER LOOP ============ */
  let lastDetectTime = 0;
  function loop(ts){
    if(!editorEl.classList.contains("active")) return;
    try{
      if(video.readyState >= 2){
        resizeIfNeeded();
        // draw camera frame
        const vw = video.videoWidth, vh = video.videoHeight;
        const cw = canvas.width, ch = canvas.height;
        const s = Math.max(cw/vw, ch/vh);
        const dx = (cw - vw*s)/2, dy = (ch - vh*s)/2;
        ctx.setTransform(1,0,0,1,0,0);
        ctx.clearRect(0,0,cw,ch);
        ctx.drawImage(video, dx, dy, vw*s, vh*s);

        // run detection ~10fps
        if(ts - lastDetectTime > 100){
          lastDetectTime = ts;
          const corners = detectCard();
          if(corners){
            lastHomography = computeHomography(corners);
            framesSinceSeen = 0;
            setLock(true);
          } else {
            framesSinceSeen++;
            if(framesSinceSeen > GRACE_FRAMES) setLock(false);
          }
        }

        if(lastHomography){
          drawOverlay(lastHomography, dx, dy, s);
        }
      }
    }catch(err){
      // never let a bad frame kill the loop — just skip this frame
    }
    requestAnimationFrame(loop);
  }

  function resizeIfNeeded(){
    const w = window.innerWidth*devicePixelRatio, h = window.innerHeight*devicePixelRatio;
    if(canvas.width !== w || canvas.height !== h) resizeCanvas();
  }

  function setLock(on){
    document.getElementById("lockDot").classList.toggle("on", on);
    document.getElementById("lockText").textContent = on ? "Anchored to card" : "Looking for card…";
  }

  function drawOverlay(H, dx, dy, s){
    ctx.save();
    ctx.translate(dx,dy);
    ctx.scale(s,s);

    // grid: draw a light mm grid across the card-local plane, extending outward
    if(showGrid){
      ctx.strokeStyle = "rgba(255,255,255,0.28)";
      ctx.lineWidth = 1/s;
      const range = 260, step = 20; // mm
      ctx.beginPath();
      for(let x=-range;x<=range;x+=step){
        const p1 = applyH(H, x, -range), p2 = applyH(H, x, range);
        ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y);
      }
      for(let y=-range;y<=range;y+=step){
        const p1 = applyH(H, -range, y), p2 = applyH(H, range, y);
        ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y);
      }
      ctx.stroke();

      // highlight the card outline itself
      ctx.strokeStyle = "rgba(232,67,47,0.9)";
      ctx.lineWidth = 2/s;
      const c = [applyH(H,0,0), applyH(H,CARD_W,0), applyH(H,CARD_W,CARD_H), applyH(H,0,CARD_H)];
      ctx.beginPath();
      ctx.moveTo(c[0].x,c[0].y);
      c.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
      ctx.closePath(); ctx.stroke();
    }

    // reference image, positioned/scaled/rotated in card-local space then warped by H
    if(refImgLoaded){
      const iw = refImg.width, ih = refImg.height;
      const drawW = 80 * tf.scale; // base width = 80mm at scale 1
      const drawH = drawW * (ih/iw);
      const corners4 = [
        {x:-drawW/2, y:-drawH/2}, {x:drawW/2, y:-drawH/2},
        {x:drawW/2, y:drawH/2}, {x:-drawW/2, y:drawH/2}
      ].map(p=>{
        const cos = Math.cos(tf.rot), sin = Math.sin(tf.rot);
        return { x: tf.x + p.x*cos - p.y*sin, y: tf.y + p.x*sin + p.y*cos };
      }).map(p=>applyH(H, p.x, p.y));

      // build a transform matrix mapping image rect -> warped quad (approx via two triangles using canvas transform per-quad is non-trivial;
      // use a simple perspective-free affine fit through 3 of the 4 points for a lightweight approximation)
      drawImageQuad(refImg, corners4);
    }
    ctx.restore();
  }

  // Approximate perspective warp of an image into a quad using triangle subdivision (canvas has no native quad warp)
  function drawImageQuad(img, quad){
    drawTriangle(img, [0,0],[img.width,0],[0,img.height], [quad[0],quad[1],quad[3]]);
    drawTriangle(img, [img.width,0],[img.width,img.height],[0,img.height], [quad[1],quad[2],quad[3]]);
  }
  function drawTriangle(img, srcPts, dstPts){
    const [s0,s1,s2] = srcPts.map(p=>Array.isArray(p)?{x:p[0],y:p[1]}:p);
    const [d0,d1,d2] = dstPts;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(d0.x,d0.y); ctx.lineTo(d1.x,d1.y); ctx.lineTo(d2.x,d2.y); ctx.closePath();
    ctx.clip();
    ctx.globalAlpha = opacity;

    const denom = (s1.x - s0.x)*(s2.y - s0.y) - (s2.x - s0.x)*(s1.y - s0.y);
    const a = ((d1.x - d0.x)*(s2.y - s0.y) - (d2.x - d0.x)*(s1.y - s0.y)) / denom;
    const b = ((d1.y - d0.y)*(s2.y - s0.y) - (d2.y - d0.y)*(s1.y - s0.y)) / denom;
    const c = ((d2.x - d0.x)*(s1.x - s0.x) - (d1.x - d0.x)*(s2.x - s0.x)) / denom;
    const d = ((d2.y - d0.y)*(s1.x - s0.x) - (d1.y - d0.y)*(s2.x - s0.x)) / denom;
    const e = d0.x - a*s0.x - c*s0.y;
    const f = d0.y - b*s0.x - d*s0.y;

    ctx.transform(a,b,c,d,e,f);
    ctx.drawImage(img,0,0);
    ctx.restore();
  }

  /* ============ CONTROLS ============ */
  document.getElementById("chooseImgBtn").onclick = ()=> document.getElementById("pickBtn").click();
  document.getElementById("tSwap").onclick = ()=> document.getElementById("pickBtn").click();
  document.getElementById("pickBtn").onchange = (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      refImg = new Image();
      refImg.onload = ()=>{
        refImgLoaded = true;
        document.getElementById("loadPrompt").style.display = "none";
        current.imageData = reader.result;
        current.name = file.name.replace(/\.[^.]+$/,"") || "Untitled";
        persist(true);
      };
      refImg.src = reader.result;
    };
    reader.readAsDataURL(file);
  };

  document.getElementById("opacitySlider").oninput = (e)=>{ opacity = e.target.value/100; persist(); };
  document.getElementById("scaleSlider").oninput = (e)=>{ tf.scale = e.target.value/100; persist(); };
  document.getElementById("tGrid").onclick = (e)=>{ showGrid = !showGrid; e.currentTarget.classList.toggle("active", showGrid); persist(); };
  document.getElementById("tReset").onclick = ()=>{ tf = { x: CARD_W/2, y: CARD_H/2 - 40, scale: 1.6, rot: 0 }; document.getElementById("scaleSlider").value=160; persist(); toast("Recentered"); };
  document.getElementById("rotateBtn").onclick = ()=>{ tf.rot += Math.PI/2; persist(); };
  document.getElementById("tDelete").onclick = async ()=>{
    if(!current) return;
    await deleteProject(current.id);
    stopCamera();
    editorEl.classList.remove("active");
    refreshHome();
    toast("Project deleted");
  };

  // drag to reposition, pinch to scale (in screen space, converted approximately via current homography)
  let dragging = false, lastPt = null, pinchStartDist = null, pinchStartScale = null;
  canvas.addEventListener("pointerdown", (e)=>{
    if(!refImgLoaded) return;
    dragging = true; lastPt = {x:e.clientX,y:e.clientY};
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener("pointermove", (e)=>{
    if(!dragging || !lastPt || !lastHomography) return;
    const dxPix = e.clientX - lastPt.x, dyPix = e.clientY - lastPt.y;
    // approximate: convert pixel delta to card-local mm delta using local homography scale
    const p0 = applyH(lastHomography, tf.x, tf.y);
    const p1 = {x:p0.x/devicePixelRatio + dxPix, y:p0.y/devicePixelRatio + dyPix};
    // invert roughly by nudging in mm units proportional to pixel delta / current px-per-mm
    const pxPerMM = dist(applyH(lastHomography,0,0), applyH(lastHomography,CARD_W,0)) / CARD_W / devicePixelRatio;
    tf.x += dxPix / pxPerMM;
    tf.y += dyPix / pxPerMM;
    lastPt = {x:e.clientX,y:e.clientY};
  });
  canvas.addEventListener("pointerup", ()=>{ dragging=false; lastPt=null; persist(); });
  canvas.addEventListener("pointercancel", ()=>{ dragging=false; lastPt=null; });

  /* ============ AUTOSAVE (debounced) ============ */
  let saveTimer = null;
  function persist(immediate){
    if(!current) return;
    current.tf = tf; current.opacity = opacity; current.showGrid = showGrid; current.updated = Date.now();
    clearTimeout(saveTimer);
    const doSave = ()=> saveProject(current).catch(()=>toast("Save failed"));
    if(immediate) doSave(); else saveTimer = setTimeout(doSave, 400);
  }
  // periodic safety save
  setInterval(()=>{ if(current && current.imageData) persist(true); }, 5000);
  window.addEventListener("pagehide", ()=>{ if(current && current.imageData) saveProject(current); });
  document.addEventListener("visibilitychange", ()=>{ if(document.hidden && current && current.imageData) saveProject(current); });

  /* ============ BOOT ============ */
  openDB().then(refreshHome);
})();
</script>
</body>
