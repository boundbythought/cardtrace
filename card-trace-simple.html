<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>CardTrace</title>
<style>
  :root{
    --ink:#0d0f10; --panel:#16181a; --line:#2a2e32; --text:#eef0f1; --dim:#8b9196;
    --accent:#e8432f; --ok:#2fae7a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%; background:var(--ink); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; overscroll-behavior:none; user-select:none;}
  #app{position:fixed; inset:0; overflow:hidden;}

  #home{position:absolute; inset:0; display:flex; flex-direction:column; background:var(--ink);}
  #home header{padding:22px 20px 14px; border-bottom:1px solid var(--line); display:flex; align-items:baseline; justify-content:space-between;}
  #home header h1{font-size:20px; margin:0; font-weight:700;}
  #home header h1 span{color:var(--accent);}
  #projectList{flex:1; overflow-y:auto; padding:14px; display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .card-tile{background:var(--panel); border:1px solid var(--line); border-radius:14px; overflow:hidden; display:flex; flex-direction:column;}
  .card-tile img{width:100%; aspect-ratio:1/1; object-fit:cover; display:block; background:#000;}
  .card-tile .meta{padding:9px 10px 11px;}
  .card-tile .meta .name{font-size:13px; font-weight:600;}
  .card-tile .meta .date{font-size:11px; color:var(--dim); margin-top:2px;}
  .card-tile .del{font-size:11px; color:var(--accent); padding:0 10px 10px; text-align:right;}
  #emptyState{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 30px; text-align:center; color:var(--dim);}
  #emptyState .suit{font-size:44px; margin-bottom:10px; color:var(--accent);}
  #newLabel{
    position:absolute; right:20px; bottom:26px; width:60px; height:60px; border-radius:50%;
    background:var(--accent); color:#fff; font-size:30px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 24px rgba(232,67,47,0.35); cursor:pointer;
  }
  #newPick{position:absolute; width:1px; height:1px; opacity:0; overflow:hidden; pointer-events:none;}

  #editor{position:absolute; inset:0; display:none; background:#000;}
  #editor.active{display:block;}
  video{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0;}
  #glcanvas{position:absolute; inset:0; width:100%; height:100%; touch-action:none;}

  #topBar{position:absolute; top:0; left:0; right:0; padding:14px; display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(to bottom, rgba(0,0,0,0.55), transparent); z-index:5;}
  .iconBtn{width:40px; height:40px; border-radius:20px; background:rgba(20,22,24,0.7); border:1px solid rgba(255,255,255,0.12);
    color:var(--text); display:flex; align-items:center; justify-content:center; font-size:18px;}
  #hint{font-size:12px; padding:6px 12px; border-radius:20px; background:rgba(20,22,24,0.7); border:1px solid rgba(255,255,255,0.12); color:var(--dim);}

  #bottomBar{position:absolute; left:0; right:0; bottom:0; padding:10px 14px calc(16px + env(safe-area-inset-bottom));
    background:linear-gradient(to top, rgba(0,0,0,0.65), transparent); z-index:5; display:flex; flex-direction:column; gap:10px;}
  .row{display:flex; align-items:center; gap:10px;}
  .row label{font-size:11px; color:var(--dim); width:52px; flex-shrink:0;}
  input[type=range]{flex:1; accent-color:var(--accent);}
  #toolRow{display:flex; justify-content:space-around;}
  .tool{display:flex; flex-direction:column; align-items:center; gap:4px; color:var(--dim); font-size:10px; background:none; border:none; cursor:pointer;}
  .tool .ic{width:44px; height:44px; border-radius:22px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
    display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--text);}
  #swapPick{position:absolute; width:1px; height:1px; opacity:0; overflow:hidden; pointer-events:none;}

  #toast{position:absolute; left:50%; bottom:100px; transform:translateX(-50%); background:rgba(20,22,24,0.92); color:var(--text);
    padding:8px 16px; border-radius:20px; font-size:12px; z-index:6; opacity:0; transition:opacity 0.25s; pointer-events:none; border:1px solid var(--line);}
  #toast.show{opacity:1;}
</style>
</head>
<body>
<div id="app">

  <div id="home">
    <header><h1>Card<span>Trace</span></h1></header>
    <div id="emptyState">
      <div class="suit">♠</div>
      <div>No projects yet.<br>Tap + to pick a reference image to trace.</div>
    </div>
    <div id="projectList" style="display:none;"></div>
    <label id="newLabel" for="newPick">+</label>
    <input id="newPick" type="file" accept="image/*">
  </div>

  <div id="editor">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="glcanvas"></canvas>

    <div id="topBar">
      <button class="iconBtn" id="backBtn">←</button>
      <div id="hint">Drag to move · pinch to resize</div>
      <button class="iconBtn" id="rotateBtn">⟳</button>
    </div>

    <div id="bottomBar">
      <div class="row"><label>Opacity</label><input type="range" id="opacitySlider" min="10" max="100" value="55"></div>
      <div id="toolRow">
        <label class="tool" id="tSwap" for="swapPick"><span class="ic">⇄</span>New image</label>
        <input id="swapPick" type="file" accept="image/*">
        <button class="tool" id="tReset"><span class="ic">⟲</span>Recenter</button>
        <button class="tool" id="tDelete"><span class="ic">🗑</span>Delete</button>
      </div>
    </div>

    <div id="toast"></div>
  </div>

</div>

<script>
(function(){
  "use strict";

  /* ---------- storage ---------- */
  const DB_NAME="cardtrace_simple", DB_VER=1, STORE="projects";
  let db;
  function openDB(){
    return new Promise((res,rej)=>{
      const req = indexedDB.open(DB_NAME, DB_VER);
      req.onupgradeneeded = e=>{ const d=e.target.result; if(!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE,{keyPath:"id"}); };
      req.onsuccess = e=>{ db=e.target.result; res(db); };
      req.onerror = e=> rej(e);
    });
  }
  function saveProject(p){ return new Promise((res,rej)=>{ const tx=db.transaction(STORE,"readwrite"); tx.objectStore(STORE).put(p); tx.oncomplete=()=>res(); tx.onerror=e=>rej(e); }); }
  function deleteProject(id){ return new Promise((res,rej)=>{ const tx=db.transaction(STORE,"readwrite"); tx.objectStore(STORE).delete(id); tx.oncomplete=()=>res(); tx.onerror=e=>rej(e); }); }
  function loadAllProjects(){ return new Promise((res,rej)=>{ const tx=db.transaction(STORE,"readonly"); const req=tx.objectStore(STORE).getAll();
    req.onsuccess=()=>res(req.result.sort((a,b)=>b.updated-a.updated)); req.onerror=e=>rej(e); }); }

  /* ---------- toast ---------- */
  const toastEl = document.getElementById("toast");
  let toastTimer;
  function toast(msg){ toastEl.textContent=msg; toastEl.classList.add("show"); clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>toastEl.classList.remove("show"),1600); }

  /* ---------- home ---------- */
  const homeEl = document.getElementById("home");
  const editorEl = document.getElementById("editor");
  const listEl = document.getElementById("projectList");
  const emptyEl = document.getElementById("emptyState");

  async function refreshHome(){
    const projects = await loadAllProjects();
    if(projects.length===0){ emptyEl.style.display="flex"; listEl.style.display="none"; return; }
    emptyEl.style.display="none"; listEl.style.display="grid"; listEl.innerHTML="";
    projects.forEach(p=>{
      const tile=document.createElement("div"); tile.className="card-tile";
      const d=new Date(p.updated);
      tile.innerHTML = `<img src="${p.imageData}"><div class="meta"><div class="name">${p.name}</div>
        <div class="date">${d.toLocaleDateString()} ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div>
        <div class="del">Delete</div>`;
      tile.querySelector("img").onclick = ()=> openEditor(p);
      tile.querySelector(".meta").onclick = ()=> openEditor(p);
      tile.querySelector(".del").onclick = async (ev)=>{ ev.stopPropagation(); await deleteProject(p.id); refreshHome(); };
      listEl.appendChild(tile);
    });
  }

  // picking a NEW image on the home screen — this happens BEFORE the camera ever starts,
  // which avoids the Android "picker forces a background tab reload" issue.
  document.getElementById("newPick").onchange = (e)=>{
    const file = e.target.files[0];
    e.target.value = "";
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      const project = {
        id: "p_"+Date.now(), name: file.name.replace(/\.[^.]+$/,"") || "Untitled",
        imageData: reader.result, tf: {x:0.5,y:0.45,w:0.55,rot:0}, opacity:0.55, updated: Date.now()
      };
      openEditor(project);
    };
    reader.onerror = ()=> toast("Couldn't read that image");
    reader.readAsDataURL(file);
  };

  document.getElementById("backBtn").onclick = ()=>{ stopCamera(); editorEl.classList.remove("active"); refreshHome(); };

  /* ---------- editor state ---------- */
  let current = null;
  const video = document.getElementById("video");
  const canvas = document.getElementById("glcanvas");
  const ctx = canvas.getContext("2d");
  let stream = null;
  let refImg = new Image();
  let refImgLoaded = false;

  function openEditor(project){
    homeEl.style.display="none";
    editorEl.classList.add("active");
    current = project;
    refImgLoaded = false;
    refImg = new Image();
    refImg.onload = ()=>{ refImgLoaded = true; };
    refImg.src = project.imageData;
    document.getElementById("opacitySlider").value = Math.round((project.opacity ?? 0.55)*100);
    startCamera();
  }

  async function startCamera(){
    try{
      stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:{ideal:"environment"}, width:{ideal:1280}, height:{ideal:720} }, audio:false
      });
      video.srcObject = stream;
      await video.play();
      resizeCanvas();
      requestAnimationFrame(loop);
    }catch(err){ toast("Camera access denied or unavailable."); }
  }
  function stopCamera(){ if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; } }
  function resizeCanvas(){
    canvas.width = window.innerWidth*devicePixelRatio;
    canvas.height = window.innerHeight*devicePixelRatio;
    canvas.style.width = window.innerWidth+"px";
    canvas.style.height = window.innerHeight+"px";
  }
  window.addEventListener("resize", resizeCanvas);

  /* ---------- render loop ---------- */
  function loop(){
    if(!editorEl.classList.contains("active")) return;
    try{
      if(video.readyState>=2){
        const vw=video.videoWidth, vh=video.videoHeight, cw=canvas.width, ch=canvas.height;
        const s=Math.max(cw/vw, ch/vh);
        const dx=(cw-vw*s)/2, dy=(ch-vh*s)/2;
        ctx.setTransform(1,0,0,1,0,0);
        ctx.clearRect(0,0,cw,ch);
        ctx.drawImage(video, dx, dy, vw*s, vh*s);

        if(refImgLoaded){
          const tf = current.tf;
          const cx = tf.x*cw, cy = tf.y*ch;
          const drawW = tf.w*cw;
          const drawH = drawW * (refImg.height/refImg.width);
          ctx.save();
          ctx.globalAlpha = current.opacity;
          ctx.translate(cx,cy);
          ctx.rotate(tf.rot);
          ctx.drawImage(refImg, -drawW/2, -drawH/2, drawW, drawH);
          ctx.restore();
        }
      }
    }catch(err){ /* never let a bad frame kill the loop */ }
    requestAnimationFrame(loop);
  }

  /* ---------- gestures: drag + pinch ---------- */
  const pointers = new Map();
  let dragStart = null, pinchStartDist = null, pinchStartW = null;

  canvas.addEventListener("pointerdown", (e)=>{
    canvas.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
    if(pointers.size === 1){
      dragStart = {x:e.clientX, y:e.clientY, tfx:current.tf.x, tfy:current.tf.y};
    } else if(pointers.size === 2){
      const pts = [...pointers.values()];
      pinchStartDist = Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
      pinchStartW = current.tf.w;
    }
  });
  canvas.addEventListener("pointermove", (e)=>{
    if(!pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
    if(pointers.size === 1 && dragStart){
      const dxp = e.clientX - dragStart.x, dyp = e.clientY - dragStart.y;
      current.tf.x = dragStart.tfx + dxp / window.innerWidth;
      current.tf.y = dragStart.tfy + dyp / window.innerHeight;
    } else if(pointers.size === 2 && pinchStartDist){
      const pts = [...pointers.values()];
      const dist = Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
      current.tf.w = Math.max(0.1, Math.min(2.5, pinchStartW * (dist/pinchStartDist)));
    }
  });
  function endPointer(e){
    pointers.delete(e.pointerId);
    dragStart = null;
    if(pointers.size < 2) pinchStartDist = null;
    persist();
  }
  canvas.addEventListener("pointerup", endPointer);
  canvas.addEventListener("pointercancel", endPointer);

  /* ---------- controls ---------- */
  document.getElementById("opacitySlider").oninput = (e)=>{ current.opacity = e.target.value/100; persist(); };
  document.getElementById("rotateBtn").onclick = ()=>{ current.tf.rot += Math.PI/2; persist(); };
  document.getElementById("tReset").onclick = ()=>{ current.tf = {x:0.5,y:0.45,w:0.55,rot:0}; persist(); toast("Recentered"); };
  document.getElementById("tDelete").onclick = async ()=>{
    await deleteProject(current.id); stopCamera(); editorEl.classList.remove("active"); refreshHome(); toast("Project deleted");
  };
  document.getElementById("swapPick").onchange = (e)=>{
    const file = e.target.files[0];
    e.target.value = "";
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      refImgLoaded = false;
      refImg = new Image();
      refImg.onload = ()=>{ refImgLoaded = true; };
      refImg.src = reader.result;
      current.imageData = reader.result;
      current.name = file.name.replace(/\.[^.]+$/,"") || "Untitled";
      persist(true);
      toast("Image swapped ✓");
    };
    reader.onerror = ()=> toast("Couldn't read that image");
    reader.readAsDataURL(file);
  };

  /* ---------- autosave ---------- */
  let saveTimer = null;
  function persist(immediate){
    if(!current) return;
    current.updated = Date.now();
    clearTimeout(saveTimer);
    const doSave = ()=> saveProject(current).catch(()=>toast("Save failed"));
    if(immediate) doSave(); else saveTimer = setTimeout(doSave, 400);
  }
  setInterval(()=>{ if(current) persist(true); }, 5000);
  window.addEventListener("pagehide", ()=>{ if(current) saveProject(current); });
  document.addEventListener("visibilitychange", ()=>{ if(document.hidden && current) saveProject(current); });

  /* ---------- boot ---------- */
  openDB().then(refreshHome);
})();
</script>
</body>
</html>
